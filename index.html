<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Smart Crop Suggestion — Real Time</title>
<style>
  :root{
    --bg:#f6fff5; --card:#ffffff; --accent:#2e7d32; --muted:#6b6b6b;
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family:Arial; background:#e8f5e9; padding:25px;
  }
  .app{
    max-width:1100px; margin:auto; display:grid; grid-template-columns:420px 1fr; gap:20px;
  }
  .card{
    background:white; padding:20px; border-radius:12px; 
    box-shadow:0 5px 18px rgba(50,100,60,0.12);
  }
  h1{margin:0 0 10px;font-size:20px}
  label{display:block;font-size:13px;color:var(--muted); margin-top:10px}
  input, select{
    width:100%; padding:10px;border-radius:8px;border:1px solid #cfe5cf; margin-top:6px;
  }
  .row{display:flex; gap:10px}
  .small{flex:1}
  button{
    background:var(--accent); color:white; border:0; padding:10px; border-radius:8px;
    cursor:pointer; font-weight:bold;
  }
  button.ghost{
    background:transparent; color:var(--accent); border:1px solid #cfe5cf;
  }
  .results{
    padding:15px; background:#f3fff3; border-radius:10px; margin-top:10px;
    border:1px solid #dcefdc;
  }
  .plant{
    padding:10px; background:white; border:1px solid #e3f0e3; border-radius:8px;
    margin-bottom:8px;
  }
  .muted{color:#666; font-size:13px}
  .badge{
    padding:4px 8px; background:#e8f5e9; border-radius:50px; font-size:12px;
    color:var(--accent);
  }
  pre{white-space:pre-wrap;margin:4px 0}
  @media(max-width:900px){ .app{grid-template-columns:1fr;} }
</style>
</head>

<body>

<div class="app">

  <!-- LEFT PANEL -->
  <div class="card">
    <h1>🌱 Smart Crop Suggestion — Real Time</h1>
    <p class="muted">Enter values — recommendations update instantly.</p>

    <label>Balcony size (sq ft)</label>
    <input id="size" type="number" value="20">

    <div class="row">
      <div class="small">
        <label>Sunlight hours / day</label>
        <input id="sun" type="number" value="4">
      </div>
      <div class="small">
        <label>Water availability</label>
        <select id="water">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
      </div>
    </div>

    <label>Prefer low-maintenance?</label>
    <select id="pref">
      <option value="no" selected>No preference</option>
      <option value="low">Yes, low-maintenance plants</option>
    </select>

  </div>

  <!-- RIGHT PANEL -->
  <div class="card">
    <h1>Live Recommendations</h1>
    <div class="muted">Updates instantly when you change any field.</div>

    <div class="results" id="results">Change any input to see suggestions…</div>
  </div>

</div>


<script>
/* --- Plant Dataset --- */
const PLANTS = [
  {name:"Mint", sun:[1,6], water:"medium", space:1, notes:"Grows in shade, very small pots", diff:1},
  {name:"Coriander", sun:[2,6], water:"medium", space:1, notes:"Quick harvest", diff:1},
  {name:"Spinach", sun:[2,6], water:"high", space:1, notes:"Great for low light", diff:2},
  {name:"Tulsi", sun:[4,10], water:"low", space:1, notes:"Very low maintenance", diff:1},
  {name:"Cherry Tomato", sun:[6,12], water:"high", space:3, notes:"Needs support", diff:3},
  {name:"Chilli", sun:[6,12], water:"medium", space:2, notes:"Compact plant", diff:3},
  {name:"Lettuce", sun:[2,6], water:"medium", space:1, notes:"Cut & grow again", diff:1},
  {name:"Fenugreek", sun:[3,8], water:"medium", space:1, notes:"Fast growing", diff:1},
  {name:"Beans", sun:[5,10], water:"medium", space:4, notes:"Climbing plant", diff:2},
  {name:"Cucumber", sun:[6,12], water:"high", space:4, notes:"High yield", diff:3},
  {name:"Aloe Vera", sun:[3,8], water:"low", space:1, notes:"Succulent, very low water", diff:1},
];

/* --- Utility --- */
function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
function waterValue(w){
  if(w==="low") return 0.5;
  if(w==="medium") return 1;
  return 1.5;
}

/* --- Scoring Function --- */
function scorePlant(plant, state){
  let sunScore;
  const [minS,maxS] = plant.sun;
  const sun = state.sun;

  if(sun >= minS && sun <= maxS) sunScore = 1;
  else {
    const dist = Math.min(Math.abs(sun-minS), Math.abs(sun-maxS));
    sunScore = clamp(1 - dist/8, 0, 1);
  }

  const waterScore = 1 - Math.abs(waterValue(plant.water) - waterValue(state.water)) / 1.5;
  const spaceScore = clamp(state.size / plant.space, 0, 1);

  let boost = 0;
  if(state.pref==="low"){
    if(plant.water==="low") boost += 0.1;
    if(plant.diff<=2) boost += 0.1;
  }

  const final = sunScore*0.45 + waterScore*0.25 + spaceScore*0.2 + boost;
  return Math.round(final*100);
}

/* --- Render Results --- */
function render(){
  const size = Number(document.getElementById("size").value);
  const sun = Number(document.getElementById("sun").value);
  const water = document.getElementById("water").value;
  const pref = document.getElementById("pref").value;

  const results = document.getElementById("results");

  if(!size || !sun){
    results.innerHTML = "Enter values to get recommendations.";
    return;
  }

  const state = {size, sun, water, pref};

  let recs = PLANTS.map(p => ({...p, score: scorePlant(p,state)}))
                   .filter(p => p.score >= 50)
                   .sort((a,b)=>b.score-a.score);

  if(recs.length===0){
    results.innerHTML = "No suitable plants found for these conditions.";
    return;
  }

  let html = "";
  recs.forEach(p=>{
    html += `
      <div class="plant">
        <strong>${p.name} — ${p.score}% match</strong><br>
        <span class="muted">${p.notes}</span>
        <pre>
Sun: ${p.sun[0]}–${p.sun[1]} hrs/day
Water: ${p.water}
Space needed: ${p.space} sq ft
Difficulty: ${p.diff <=2 ? "Easy" : p.diff===3 ? "Medium" : "Hard"}
        </pre>
      </div>
    `;
  });

  results.innerHTML = html;
}

/* --- Live Events --- */
["size","sun","water","pref"].forEach(id=>{
  document.getElementById(id).addEventListener("input", render);
});

/* Initial render */
render();
</script>

</body>
</html>
